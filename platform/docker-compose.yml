version: '3.8'

################################################################################
# AIOpc Platform - 生产环境 Docker Compose 配置
# 扫码即用 OpenClaw 云服务
################################################################################

services:
  ##############################################################################
  # PostgreSQL 数据库
  ##############################################################################
  postgres:
    image: postgres:14-alpine
    container_name: opclaw-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-opclaw}
      POSTGRES_USER: ${DB_USER:-opclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # 性能优化
      shared_buffers: '256MB'
      effective_cache_size: '1GB'
      maintenance_work_mem: '64MB'
      checkpoint_completion_target: '0.9'
      wal_buffers: '16MB'
      default_statistics_target: '100'
      random_page_cost: '1.1'
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # 初始化脚本
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opclaw-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ##############################################################################
  # Redis 缓存
  ##############################################################################
  redis:
    image: redis:7-alpine
    container_name: opclaw-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - opclaw-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ##############################################################################
  # 后端服务
  ##############################################################################
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: opclaw-backend
    environment:
      # 服务器配置
      PORT: ${BACKEND_PORT:-3000}
      NODE_ENV: production

      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-opclaw}
      DB_USER: ${DB_USER:-opclaw}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # JWT 配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # 飞书配置
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN}
      FEISHU_OAUTH_AUTHORIZE_URL: ${FEISHU_OAUTH_AUTHORIZE_URL}
      FEISHU_OAUTH_TOKEN_URL: ${FEISHU_OAUTH_TOKEN_URL}
      FEISHU_USER_INFO_URL: ${FEISHU_USER_INFO_URL}

      # DeepSeek API 配置
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}

      # Docker 配置 (用于管理实例容器)
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_SOCKET_PATH: /var/run/docker.sock

      # 日志级别
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      # 挂载 Docker socket 用于管理实例容器
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # 实例容器数据卷
      - instances-data:/instances
      # 日志目录
      - ./logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - opclaw-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ##############################################################################
  # 前端服务
  ##############################################################################
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: opclaw-frontend
    environment:
      # API 地址
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_APP_NAME: ${VITE_APP_NAME:-AIOpc}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - opclaw-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ##############################################################################
  # Nginx 反向代理 (可选)
  ##############################################################################
  nginx:
    image: nginx:alpine
    container_name: opclaw-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - opclaw-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - with-nginx

networks:
  opclaw-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  instances-data:
    driver: local
