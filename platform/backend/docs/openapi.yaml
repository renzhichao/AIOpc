openapi: 3.0.3
info:
  title: AIOpc Platform API
  description: |
    AIOpc Platform API for managing OpenClaw AI Agent instances.
    Provides OAuth authentication, instance lifecycle management, health monitoring, and more.
  version: 1.0.0
  contact:
    name: AIOpc Platform Team
    email: support@aiopc.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.aiopc.com/api/v1
    description: Production server

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: OAuth
    description: OAuth 2.0 authentication endpoints
  - name: Instances
    description: Instance management endpoints
  - name: Users
    description: User management endpoints
  - name: API Keys
    description: API key management endpoints
  - name: Monitoring
    description: Monitoring and metrics endpoints
  - name: Webhooks
    description: Feishu webhook endpoints

paths:
  /health:
    get:
      tags: [Health]
      summary: Platform health check
      description: Returns the overall health status of the platform
      operationId: getPlatformHealth
      responses:
        '200':
          description: Platform is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  database:
                    type: string
                    enum: [connected, disconnected]
                  redis:
                    type: string
                    enum: [connected, disconnected]

  /health/statistics:
    get:
      tags: [Health]
      summary: Get health statistics
      description: Returns aggregated health statistics across all instances
      operationId: getHealthStatistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Health statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatistics'

  /health/instances/{instanceId}:
    get:
      tags: [Health]
      summary: Check instance health
      description: Performs a detailed health check on a specific instance
      operationId: checkInstanceHealth
      security:
        - BearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: httpCheckEnabled
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            default: 5000
        - name: retries
          in: query
          required: false
          schema:
            type: integer
            default: 3
      responses:
        '200':
          description: Instance health check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceHealth'
        '404':
          $ref: '#/components/responses/NotFound'

  /health/instances/{instanceId}/recover:
    post:
      tags: [Health]
      summary: Trigger instance recovery
      description: Manually triggers recovery actions for an unhealthy instance
      operationId: triggerInstanceRecovery
      security:
        - BearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                actions:
                  type: array
                  items:
                    type: string
                    enum: [restart, recreate, reconfigure]
      responses:
        '200':
          description: Recovery triggered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /health/instances/{instanceId}/history:
    get:
      tags: [Health]
      summary: Get instance health history
      description: Returns the health check history for a specific instance
      operationId: getInstanceHealthHistory
      security:
        - BearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Health history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthHistory'

  /health/instances/{instanceId}/history/clear:
    post:
      tags: [Health]
      summary: Clear instance health history
      description: Clears the health check history for a specific instance
      operationId: clearInstanceHealthHistory
      security:
        - BearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Health history cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /health/cycle:
    post:
      tags: [Health]
      summary: Run health check cycle
      description: Triggers a comprehensive health check cycle for all instances
      operationId: runHealthCheckCycle
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                parallel:
                  type: boolean
                  default: true
                recoveryEnabled:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Health check cycle completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatistics'

  /oauth/authorize:
    get:
      tags: [OAuth]
      summary: Get OAuth authorization URL
      description: Generates the Feishu OAuth authorization URL
      operationId: getAuthorizationUrl
      parameters:
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: Authorization URL generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /oauth/callback:
    post:
      tags: [OAuth]
      summary: OAuth callback handler
      description: Handles the OAuth callback from Feishu
      operationId: handleOAuthCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: Authorization code from Feishu
      responses:
        '200':
          description: OAuth callback processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /oauth/refresh:
    post:
      tags: [OAuth]
      summary: Refresh access token
      description: Refreshes an expired access token using a refresh token
      operationId: refreshAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/verify:
    post:
      tags: [OAuth]
      summary: Verify token
      description: Verifies a JWT token and returns its payload
      operationId: verifyToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  payload:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /instances:
    get:
      tags: [Instances]
      summary: List instances
      description: Returns a paginated list of instances for the authenticated user
      operationId: listInstances
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, active, stopped, error]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Instances retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInstances'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Instances]
      summary: Create instance
      description: Creates a new OpenClaw instance
      operationId: createInstance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - template
              properties:
                template:
                  type: string
                  enum: [personal, team, enterprise]
                  description: Instance template
                config:
                  type: object
                  properties:
                    name:
                      type: string
                      maxLength: 100
                    description:
                      type: string
                      maxLength: 500
      responses:
        '201':
          description: Instance created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /instances/{id}:
    get:
      tags: [Instances]
      summary: Get instance details
      description: Returns detailed information about a specific instance
      operationId: getInstance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instance details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Instances]
      summary: Delete instance
      description: Permanently deletes an instance
      operationId: deleteInstance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instance deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/start:
    post:
      tags: [Instances]
      summary: Start instance
      description: Starts a stopped instance
      operationId: startInstance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instance started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/stop:
    post:
      tags: [Instances]
      summary: Stop instance
      description: Stops a running instance
      operationId: stopInstance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instance stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/restart:
    post:
      tags: [Instances]
      summary: Restart instance
      description: Restarts an instance
      operationId: restartInstance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instance restarted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/logs:
    get:
      tags: [Instances]
      summary: Get instance logs
      description: Retrieves logs from a specific instance
      operationId: getInstanceLogs
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
      responses:
        '200':
          description: Logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      instance_id:
                        type: string
                        format: uuid
                      logs:
                        type: array
                        items:
                          type: string
                      lines:
                        type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/config:
    get:
      tags: [Instances]
      summary: Get instance configuration
      description: Returns the current configuration of an instance
      operationId: getInstanceConfig
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      instance_id:
                        type: string
                        format: uuid
                      config:
                        type: object
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    patch:
      tags: [Instances]
      summary: Update instance configuration
      description: Updates the configuration of an instance
      operationId: updateInstanceConfig
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                llm:
                  type: object
                  description: LLM configuration
                skills:
                  type: array
                  items:
                    type: string
                  description: Enabled skills
                tools:
                  type: array
                  items:
                    type: string
                  description: Enabled tools
                system_prompt:
                  type: string
                  description: Custom system prompt
                limits:
                  type: object
                  description: Usage limits
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/renew:
    post:
      tags: [Instances]
      summary: Renew instance
      description: Extends the expiration date of an instance
      operationId: renewInstance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - duration_days
              properties:
                duration_days:
                  type: integer
                  enum: [30, 90, 180]
                  description: Number of days to extend
      responses:
        '200':
          description: Instance renewed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      instance_id:
                        type: string
                        format: uuid
                      old_expires_at:
                        type: string
                        format: date-time
                      new_expires_at:
                        type: string
                        format: date-time
                      extended_days:
                        type: integer
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/renewals:
    get:
      tags: [Instances]
      summary: Get renewal history
      description: Returns the renewal history for an instance
      operationId: getRenewalHistory
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Renewal history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      instance_id:
                        type: string
                        format: uuid
                      renewals:
                        type: array
                        items:
                          $ref: '#/components/schemas/Renewal'
                      total_renewals:
                        type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/qr-code:
    get:
      tags: [Instances]
      summary: Get QR code
      description: Generates or retrieves the QR code for claiming an instance
      operationId: getQRCode
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: QR code generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      qr_code_url:
                        type: string
                        format: uri
                      expires_at:
                        type: string
                        format: date-time
                      signature:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /instances/{id}/metrics:
    get:
      tags: [Instances]
      summary: Get instance metrics
      description: Returns performance metrics for an instance
      operationId: getInstanceMetrics
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: start_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Metrics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      instance_id:
                        type: string
                        format: uuid
                      metrics:
                        $ref: '#/components/schemas/InstanceMetrics'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from OAuth callback

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        feishu_user_id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Instance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        template:
          type: string
          enum: [personal, team, enterprise]
        config:
          type: object
        container_id:
          type: string
        container_name:
          type: string
        status:
          type: string
          enum: [pending, active, stopped, error]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InstanceHealth:
      type: object
      properties:
        instance_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [healthy, unhealthy, unknown]
        checks:
          type: object
          properties:
            container_running:
              type: boolean
            http_accessible:
              type: boolean
            last_check_time:
              type: string
              format: date-time
        error:
          type: string
        last_recovered_at:
          type: string
          format: date-time

    HealthStatistics:
      type: object
      properties:
        total_instances:
          type: integer
        healthy_instances:
          type: integer
        unhealthy_instances:
          type: integer
        unknown_instances:
          type: integer
        last_check_time:
          type: string
          format: date-time

    HealthHistory:
      type: object
      properties:
        instance_id:
          type: string
          format: uuid
        history:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              status:
                type: string
              checks:
                type: object
              error:
                type: string

    InstanceMetrics:
      type: object
      properties:
        cpu_usage_percent:
          type: number
        memory_usage_mb:
          type: number
        memory_limit_mb:
          type: number
        network_rx_bytes:
          type: integer
        network_tx_bytes:
          type: integer
        disk_read_bytes:
          type: integer
        disk_write_bytes:
          type: integer
        timestamp:
          type: string
          format: date-time

    Renewal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        instance_id:
          type: string
          format: uuid
        old_expires_at:
          type: string
          format: date-time
        new_expires_at:
          type: string
          format: date-time
        duration_days:
          type: integer
        renewed_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    PaginatedInstances:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Instance'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Request validation failed
            details:
              type: object

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Request validation failed
              details:
                validationErrors:
                  - field: email
                    constraints: [Invalid email format]

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication required

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Access denied to this resource

    NotFound:
      description: Resource not found
      content:
