# AIOpc Platform - Nginx 简化配置
# 适用于当前生产环境

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 前端应用 + 后端API代理
    server {
        listen 80;
        server_name renava.cn 118.25.0.190;

        # 文件上传大小限制
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # 前端 (Vite dev server)
        location / {
            proxy_pass http://opclaw-frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 后端API代理 - 文件上传关键配置
        location /api/ {
            # 文件上传配置
            client_max_body_size 10M;
            client_body_buffer_size 128k;

            # 禁用缓冲以支持大文件上传
            proxy_buffering off;
            proxy_request_buffering off;

            proxy_pass http://opclaw-backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置 - 文件上传需要更长超时
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 确保请求体和头部被传递
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
        }

        # WebSocket代理
        location /ws/ {
            proxy_pass http://opclaw-backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket需要长超时
            proxy_read_timeout 86400;
        }

        # 健康检查
        location /health {
            proxy_pass http://opclaw-backend:3000/health;
            access_log off;
        }
    }
}
