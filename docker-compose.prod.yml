# AIOpc 生产环境 Docker Compose 配置
#
# 此配置文件定义了完整的AIOpc平台服务栈：
# - 后端API服务
# - 前端静态文件服务
# - PostgreSQL数据库
# - Redis缓存
#
# 使用方法:
#   1. 复制 .env.example 到 .env 并配置环境变量
#   2. 运行: docker-compose up -d
#   3. 查看日志: docker-compose logs -f
#   4. 停止服务: docker-compose down

version: '3.8'

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: opclaw-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opclaw}
      POSTGRES_USER: ${POSTGRES_USER:-opclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opclaw} -d ${POSTGRES_DB:-opclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - opclaw-network

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: opclaw-redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis-data:/data

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - opclaw-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 后端 API 服务
  # ============================================
  backend:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        BUILD_DATE: ${BUILD_DATE:-2024-01-01}

    container_name: opclaw-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      # 应用配置
      NODE_ENV: production
      PORT: 3000

      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-opclaw}
      DB_USERNAME: ${POSTGRES_USER:-opclaw}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SYNC: "false"
      DB_LOG_LEVEL: error

      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Feishu OAuth
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-https://renava.cn/oauth/callback}
      FEISHU_OAUTH_AUTHORIZE_URL: ${FEISHU_OAUTH_AUTHORIZE_URL:-https://open.feishu.cn/open-apis/authen/v1/authorize}
      FEISHU_OAUTH_TOKEN_URL: ${FEISHU_OAUTH_TOKEN_URL:-https://open.feishu.cn/open-apis/authen/v1/oidc/access_token}
      FEISHU_OAUTH_USERINFO_URL: ${FEISHU_OAUTH_USERINFO_URL:-https://open.feishu.cn/open-apis/authen/v1/user_info}
      FEISHU_VERIFY_TOKEN: ${FEISHU_VERIFY_TOKEN}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY}

      # DeepSeek API
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}

      # JWT配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # CORS配置
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://renava.cn,https://www.renava.cn}

      # Docker配置
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      DOCKER_NETWORK: opclaw-network

      # 其他配置
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_METRICS: "true"

    volumes:
      - backend-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - opclaw-network

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 前端静态文件服务 (Nginx)
  # ============================================
  frontend:
    image: nginx:alpine
    container_name: opclaw-frontend
    restart: unless-stopped

    depends_on:
      - backend

    volumes:
      - ./platform/frontend/dist:/usr/share/nginx/html:ro
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl/certs:/etc/nginx/certs:ro

    ports:
      - "80:80"
      - "443:443"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - opclaw-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 数据库迁移服务 (一次性运行)
  # ============================================
  migrate:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile

    container_name: opclaw-migrate

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-opclaw}
      DB_USERNAME: ${POSTGRES_USER:-opclaw}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      NODE_ENV: production

    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 10 &&
        echo 'Running database migrations...' &&
        npm run db:migrate &&
        echo 'Migrations completed successfully'
      "

    networks:
      - opclaw-network

    # 运行一次后退出
    restart: "no"

# ============================================
# 数据卷定义
# ============================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  backend-data:
    driver: local

# ============================================
# 网络定义
# ============================================
networks:
  opclaw-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
