version: '3.8'

# 本地开发环境 Docker Compose 配置
# 用途: 在本地启动完整的开发和测试环境，无需依赖云资源
# 启动命令: docker-compose -f docker-compose.dev.yml up -d

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: opclaw-postgres-dev
    environment:
      POSTGRES_DB: opclaw_dev
      POSTGRES_USER: opclaw
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-dev-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opclaw -d opclaw_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opclaw-dev-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: opclaw-redis-dev
    command: >
      redis-server
      --requirepass dev_password
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opclaw-dev-network
    restart: unless-stopped

  # Mock 飞书服务 (开发测试用)
  feishu-mock:
    build:
      context: ./mock-services/feishu
      dockerfile: Dockerfile
    container_name: opclaw-feishu-mock
    environment:
      NODE_ENV: development
      PORT: 3000
      MOCK_USER_ID: mock_user_123
      MOCK_USER_NAME: 开发测试用户
      MOCK_USER_EMAIL: dev@example.com
      LOG_LEVEL: debug
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - opclaw-dev-network
    restart: unless-stopped

  # 后端 API 服务
  backend:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
      target: development
    container_name: opclaw-backend-dev
    environment:
      # 服务配置
      NODE_ENV: development
      PORT: 3000

      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opclaw_dev
      DB_USER: opclaw
      DB_PASSWORD: dev_password

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: dev_password

      # JWT 配置
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d

      # 飞书配置 (使用 Mock 服务)
      FEISHU_APP_ID: mock_app_id
      FEISHU_APP_SECRET: mock_app_secret
      FEISHU_REDIRECT_URI: http://localhost:5173/oauth/callback
      FEISHU_VERIFY_TOKEN: mock_verify_token
      FEISHU_ENCRYPT_KEY: mock_encrypt_key
      FEISHU_OAUTH_AUTHORIZE_URL: http://feishu-mock:3000/authen/v1/authorize
      FEISHU_OAUTH_TOKEN_URL: http://feishu-mock:3000/authen/v1/oauth/token
      FEISHU_USER_INFO_URL: http://feishu-mock:3000/contact/v3/users/me
      FEISHU_WEBHOOK_URL: http://feishu-mock:3000/v1/events

      # DeepSeek API 配置
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_BASE: https://api.deepseek.com

      # Docker 配置
      DOCKER_SOCKET_PATH: /var/run/docker.sock

      # 日志配置
      LOG_LEVEL: debug
      LOG_FORMAT: json

      # 健康检查配置
      HEALTH_CHECK_ENABLED: "true"
      HEALTH_CHECK_INTERVAL: 60000
      HTTP_HEALTH_CHECK_ENABLED: "true"

      # CORS 配置
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./platform/backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      feishu-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - opclaw-dev-network
    restart: unless-stopped
    command: pnpm run dev

  # 前端应用 (可选，也可以独立运行)
  frontend:
    build:
      context: ./platform/frontend
      dockerfile: Dockerfile
      target: development
    container_name: opclaw-frontend-dev
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
    volumes:
      - ./platform/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - opclaw-dev-network
    restart: unless-stopped
    command: pnpm run dev -- --host

  # PgAdmin (可选，用于数据库管理)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opclaw-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - opclaw-dev-network
    restart: unless-stopped
    profiles:
      - tools

  # Redis Commander (可选，用于 Redis 管理)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opclaw-redis-commander-dev
    environment:
      REDIS_HOSTS: local:redis:6379:0:dev_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - opclaw-dev-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local

networks:
  opclaw-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
