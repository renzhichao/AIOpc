#==============================================================================
# AIOpc Nginx Configuration
#==============================================================================
# Domain: renava.cn
# Description: Reverse proxy for AIOpc cloud platform
#
# Features:
# - HTTP to HTTPS redirect
# - Frontend static file serving
# - Backend API proxy
# - OAuth callback handling
# - WebSocket support
# - Security headers
# - SSL configuration (ready for certbot)
#
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/opclaw
#   2. Create symlink: ln -s /etc/nginx/sites-available/opclaw /etc/nginx/sites-enabled/
#   3. Test: nginx -t
#   4. Reload: systemctl reload nginx
#   5. Run certbot to obtain SSL certificate
#==============================================================================

# Upstream configuration for backend API
upstream opclaw_backend {
    server localhost:3000;
    keepalive 64;
}

#------------------------------------------------------------------------------
# HTTP Server - Redirect to HTTPS
#------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name renava.cn www.renava.cn;

    # Allow Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

#------------------------------------------------------------------------------
# HTTPS Server - Main Configuration
#------------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name renava.cn www.renava.cn;

    #----------------------------------------------------------------------------
    # SSL Configuration (will be configured by certbot)
    #----------------------------------------------------------------------------

    # SSL certificate paths (certbot will populate these)
    ssl_certificate /etc/letsencrypt/live/renava.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renava.cn/privkey.pem;

    # SSL session configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    #----------------------------------------------------------------------------
    # Security Headers
    #----------------------------------------------------------------------------

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy (adjust based on your needs)
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'self';" always;

    #----------------------------------------------------------------------------
    # Logging
    #----------------------------------------------------------------------------

    access_log /var/log/nginx/opclaw-access.log;
    error_log /var/log/nginx/opclaw-error.log;

    #----------------------------------------------------------------------------
    # Root Location - Frontend Static Files
    #----------------------------------------------------------------------------

    location / {
        root /var/www/opclaw;
        index index.html;

        # Try static file first, fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for HTML files
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    #----------------------------------------------------------------------------
    # Backend API Proxy
    #----------------------------------------------------------------------------

    location /api/ {
        proxy_pass http://opclaw_backend;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Don't proxy certain headers
        proxy_hide_header X-Powered-By;
    }

    #----------------------------------------------------------------------------
    # OAuth Callback Endpoint
    #----------------------------------------------------------------------------

    location /oauth/ {
        proxy_pass http://opclaw_backend;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #----------------------------------------------------------------------------
    # Health Check Endpoint
    #----------------------------------------------------------------------------

    location /health {
        proxy_pass http://opclaw_backend/health;
        access_log off;
    }

    #----------------------------------------------------------------------------
    # Metrics Endpoint (restrict access if needed)
    #----------------------------------------------------------------------------

    location /metrics {
        proxy_pass http://opclaw_backend/metrics;
        # Uncomment to restrict access
        # allow 127.0.0.1;
        # deny all;
    }

    #----------------------------------------------------------------------------
    # WebSocket Support
    #----------------------------------------------------------------------------

    location /ws/ {
        proxy_pass http://opclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    #----------------------------------------------------------------------------
    # File Upload Size Limits
    #----------------------------------------------------------------------------

    client_max_body_size 10M;
    client_body_buffer_size 128k;

    #----------------------------------------------------------------------------
    # Deny access to hidden files
    #----------------------------------------------------------------------------

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    #----------------------------------------------------------------------------
    # Deny access to backup and source files
    #----------------------------------------------------------------------------

    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
    }
}

#==============================================================================
# End of Configuration
#==============================================================================
