#==============================================================================
# AIOpc HTTP to HTTPS Redirect Configuration
#==============================================================================
# Purpose: Redirect all HTTP traffic to HTTPS
# Domain: renava.cn
#
# This configuration handles:
#   1. HTTP to HTTPS redirects
#   2. Let's Encrypt ACME challenges
#   3. Both www and non-www domains
#
# Installation:
#   1. This configuration is included in opclaw.conf
#   2. Or copy to /etc/nginx/sites-available/redirect
#   3. Create symlink: ln -s /etc/nginx/sites-available/redirect /etc/nginx/sites-enabled/
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx
#==============================================================================

#------------------------------------------------------------------------------
# HTTP Server - Redirect to HTTPS
#------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name renava.cn www.renava.cn api.renava.cn;

    #----------------------------------------------------------------------------
    # Allow Let's Encrypt ACME Challenge
    #----------------------------------------------------------------------------
    # This location is required for Let's Encrypt to validate domain ownership
    # Do not remove or redirect this location
    #----------------------------------------------------------------------------

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    #----------------------------------------------------------------------------
    # Redirect all other HTTP traffic to HTTPS
    #----------------------------------------------------------------------------
    # Using 301 permanent redirect for SEO and security best practices
    #----------------------------------------------------------------------------

    location / {
        return 301 https://$server_name$request_uri;
    }
}

#==============================================================================
# End of Configuration
#==============================================================================
