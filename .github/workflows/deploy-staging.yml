#==============================================================================
# AIOpc CD Pipeline - Deploy to Staging Environment
#==============================================================================
# 自动部署到 Staging 环境 (Automatic deployment to Staging environment)
#
# 触发条件 (Trigger):
#   - Push to develop branch
#   - Manual workflow dispatch
#
# 部署流程 (Deployment Process):
#   1. 创建备份 (Create backup)
#   2. 部署组件 (Deploy components)
#   3. 健康检查 (Health checks with retry)
#   4. 验证部署 (Verify deployment)
#   5. 失败时自动回滚 (Auto-rollback on failure)
#
# 目标 (Goals):
#   - 部署时间 < 5 分钟 (Deployment time < 5 minutes)
#   - 回滚时间 < 3 分钟 (Rollback time < 3 minutes)
#   - 健康检查超时 60 秒 (Health check timeout 60s)
#   - 重试 3 次 (Retry 3 times)
#==============================================================================

name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch and workflow
concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ##############################################################################
  # Job 1: Deploy to Staging - Main deployment job
  ##############################################################################
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    # Environment configuration
    environment:
      name: staging
      url: http://118.25.0.190

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #------------------------------------------------------------------------
      # Setup SSH for deployment
      #------------------------------------------------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/rap001_opclaw
          chmod 600 ~/.ssh/rap001_opclaw
          ssh-keyscan -H ${{ secrets.STAGING_SERVER }} >> ~/.ssh/known_hosts

      #------------------------------------------------------------------------
      # Pre-deployment: Create backup
      #------------------------------------------------------------------------
      - name: Create pre-deployment backup
        id: backup
        run: |
          echo "==> Creating pre-deployment backup..."
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_DIR="/opt/opclaw/backups/backup_${TIMESTAMP}"

          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "mkdir -p ${BACKUP_DIR}"

          # Backup backend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw && tar -czf ${BACKUP_DIR}/backend.tar.gz backend/ 2>/dev/null || true"

          # Backup frontend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "tar -czf ${BACKUP_DIR}/frontend.tar.gz /var/www/opclaw 2>/dev/null || true"

          # Backup database
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "docker exec opclaw-postgres pg_dump -U opclaw opclaw | gzip > ${BACKUP_DIR}/database.sql.gz 2>/dev/null || true"

          # Save backup metadata
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cat > ${BACKUP_DIR}/metadata.txt << EOF
          Timestamp: ${TIMESTAMP}
          Deploy Date: $(date)
          Deploy User: github-actions
          Deploy Host: ${{ secrets.STAGING_SERVER }}
          Component: all
          Environment: staging
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          EOF"

          echo "backup_dir=${BACKUP_DIR}" >> $GITHUB_OUTPUT
          echo "✅ Backup created: ${BACKUP_DIR}"

      #------------------------------------------------------------------------
      # Setup deployment environment
      #------------------------------------------------------------------------
      - name: Setup deployment environment
        run: |
          echo "==> Setting up deployment environment..."

          # Create deployment directory
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "mkdir -p /opt/opclaw/platform"

          echo "✅ Deployment environment ready"

      #------------------------------------------------------------------------
      # Deploy backend
      #------------------------------------------------------------------------
      - name: Deploy backend
        id: deploy-backend
        run: |
          echo "==> Deploying backend..."

          # Sync backend code using rsync
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'coverage' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/rap001_opclaw" \
            platform/backend/ \
            root@${{ secrets.STAGING_SERVER }}:/opt/opclaw/backend/

          # Install production dependencies
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw/backend && pnpm install --prod --frozen-lockfile"

          # Build backend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw/backend && pnpm run build"

          echo "✅ Backend deployed successfully"

      #------------------------------------------------------------------------
      # Deploy frontend
      #------------------------------------------------------------------------
      - name: Deploy frontend
        id: deploy-frontend
        run: |
          echo "==> Deploying frontend..."

          # Build frontend locally
          cd platform/frontend
          pnpm install --frozen-lockfile
          pnpm run build
          cd ../..

          # Create frontend directory on server
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "mkdir -p /var/www/opclaw"

          # Sync frontend build artifacts
          rsync -avz --delete \
            --exclude '*.map' \
            -e "ssh -i ~/.ssh/rap001_opclaw" \
            platform/frontend/dist/ \
            root@${{ secrets.STAGING_SERVER }}:/var/www/opclaw/

          # Set permissions
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "chown -R www-data:www-data /var/www/opclaw && chmod -R 755 /var/www/opclaw"

          echo "✅ Frontend deployed successfully"

      #------------------------------------------------------------------------
      # Restart services
      #------------------------------------------------------------------------
      - name: Restart services
        id: restart-services
        run: |
          echo "==> Restarting services..."

          # Restart backend service
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw && docker compose restart backend"

          # Reload nginx
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "systemctl reload nginx"

          # Wait for services to start
          echo "Waiting for services to start..."
          sleep 10

          echo "✅ Services restarted successfully"

      #------------------------------------------------------------------------
      # Health check with retry
      #------------------------------------------------------------------------
      - name: Health check - Backend
        id: health-backend
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 1
          max_attempts: 3
          retry_on: error
          command: |
            echo "==> Checking backend health..."
            if ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
              "curl -sf http://localhost:3000/health"; then
              echo "✅ Backend health check passed"
            else
              echo "❌ Backend health check failed"
              exit 1
            fi

      - name: Health check - Frontend
        id: health-frontend
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 1
          max_attempts: 3
          retry_on: error
          command: |
            echo "==> Checking frontend health..."
            HTTP_CODE=$(ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost" || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "✅ Frontend health check passed (HTTP ${HTTP_CODE})"
            else
              echo "❌ Frontend health check failed (HTTP ${HTTP_CODE})"
              exit 1
            fi

      - name: Health check - Database
        id: health-database
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 1
          max_attempts: 3
          retry_on: error
          command: |
            echo "==> Checking database health..."
            if ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
              "docker exec opclaw-postgres pg_isready -U opclaw"; then
              echo "✅ Database health check passed"
            else
              echo "❌ Database health check failed"
              exit 1
            fi

      #------------------------------------------------------------------------
      # Run verification script
      #------------------------------------------------------------------------
      - name: Verify deployment
        id: verify-deployment
        run: |
          echo "==> Verifying deployment..."

          # Run verification script
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw && ./scripts/deploy/verify.sh --env staging --component all" || {
            echo "❌ Verification failed"
            exit 1
          }

          echo "✅ Deployment verification passed"

      #------------------------------------------------------------------------
      # Calculate deployment time
      #------------------------------------------------------------------------
      - name: Calculate deployment time
        if: always()
        run: |
          END_TIME=$(date +%s)
          START_TIME=${{ github.event.head_commit.timestamp }}
          if [ -z "$START_TIME" ]; then
            START_TIME=$(date +%s)
          fi

          # Convert timestamp to seconds
          START_TIME_SEC=$(date -d "$START_TIME" +%s 2>/dev/null || echo "$START_TIME")

          DEPLOYMENT_TIME=$((END_TIME - START_TIME_SEC))
          echo "Deployment time: ${DEPLOYMENT_TIME}s"

          if [ $DEPLOYMENT_TIME -gt 300 ]; then
            echo "⚠️ Deployment exceeded 5 minutes"
            echo "deployment_time=${DEPLOYMENT_TIME}s" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Deployment completed within 5 minutes"
            echo "deployment_time=${DEPLOYMENT_TIME}s" >> $GITHUB_STEP_SUMMARY
          fi

      #------------------------------------------------------------------------
      # Rollback on failure
      #------------------------------------------------------------------------
      - name: Rollback on failure
        if: failure()
        run: |
          echo "==> Deployment failed, initiating rollback..."
          BACKUP_DIR="${{ steps.backup.outputs.backup_dir }}"

          # Rollback backend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw && tar -xzf ${BACKUP_DIR}/backend.tar.gz" || true

          # Rollback frontend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "rm -rf /var/www/opclaw && tar -xzf ${BACKUP_DIR}/frontend.tar.gz -C /" || true

          # Rollback database
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "gunzip < ${BACKUP_DIR}/database.sql.gz | docker exec -i opclaw-postgres psql -U opclaw opclaw" || true

          # Restart services
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.STAGING_SERVER }} \
            "cd /opt/opclaw && docker compose restart backend && systemctl reload nginx"

          echo "✅ Rollback completed"

      #------------------------------------------------------------------------
      # Notify deployment status
      #------------------------------------------------------------------------
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** Staging" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** http://118.25.0.190" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** Staging" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "**Action:** Automatic rollback initiated" >> $GITHUB_STEP_SUMMARY
          fi

  ##############################################################################
  # Job 2: Post-Deployment Tests - Run smoke tests
  ##############################################################################
  post-deploy-tests:
    name: Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install test dependencies
        working-directory: platform/e2e
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        working-directory: platform/e2e
        env:
          CI: true
          BASE_URL: http://118.25.0.190
        run: |
          pnpm exec playwright test --project=chromium --grep "@smoke"
        continue-on-error: true

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: platform/e2e/playwright-report/
          retention-days: 7

  ##############################################################################
  # Job 3: Deployment Summary - Generate deployment report
  ##############################################################################
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-staging, post-deploy-tests]

    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "# Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.deploy-staging.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Post-Deploy Tests: ${{ needs.post-deploy-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Access URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://118.25.0.190" >> $GITHUB_STEP_SUMMARY
          echo "- Backend API: http://118.25.0.190/api" >> $GITHUB_STEP_SUMMARY
          echo "- Health Check: http://118.25.0.190/api/health" >> $GITHUB_STEP_SUMMARY
