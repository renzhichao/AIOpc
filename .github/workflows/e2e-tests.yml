name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: platform/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./platform/frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./platform/frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend services
        working-directory: ./platform/backend
        run: |
          pnpm install --frozen-lockfile
          pnpm run dev &
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -s http://localhost:3000/health; do sleep 2; done' || exit 1

      - name: Start mock services
        working-directory: ./mock-services
        run: |
          pnpm install --frozen-lockfile
          pnpm run dev &
          echo "Waiting for mock services to be ready..."
          sleep 10

      - name: Run E2E tests
        working-directory: ./platform/frontend
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: platform/frontend/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: platform/frontend/test-results/screenshots/
          retention-days: 7

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: platform/frontend/test-results/videos/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: platform/frontend/test-results/traces/
          retention-days: 7

  e2e-tests-report:
    name: E2E Test Report
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: platform/frontend/playwright-report

      - name: Publish test report
        uses: actions/upload-artifact@v4
        with:
          name: html-test-report
          path: platform/frontend/playwright-report/index.html

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'platform/frontend/playwright-report/index.html';

            if (fs.existsSync(reportPath)) {
              const comment = `## E2E Test Results 🎭

              Test report has been generated. Download the 'html-test-report' artifact to view detailed results.

              ✅ Tests completed on workflow run: #${{ github.run_number }}`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
