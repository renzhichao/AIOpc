name: Quality Gate

on:
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: platform/${{ matrix.component }}
        run: pnpm install --frozen-lockfile

      - name: Run ESLint (non-blocking)
        id: eslint
        working-directory: platform/${{ matrix.component }}
        run: pnpm exec eslint . --ext .ts --quiet || echo "ESLint findings detected"
        continue-on-error: true

      - name: Run TypeScript check
        working-directory: platform/${{ matrix.component }}
        run: |
          if [ -f "tsconfig.json" ]; then
            pnpm run build
          else
            echo "No tsconfig.json found, skipping type check"
          fi

      - name: Run tests with coverage
        working-directory: platform/${{ matrix.component }}
        run: pnpm run test:coverage
        continue-on-error: true

      - name: Check coverage threshold
        working-directory: platform/${{ matrix.component }}
        run: |
          # Extract coverage from test output
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -e "
              const summary = require('./coverage/coverage-summary.json');
              const total = summary.total;
              const linesPct = total.lines.pct;
              console.log(linesPct);
            ")
            echo "Current coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "::error::Coverage ${COVERAGE}% is below threshold 80%"
              exit 1
            fi
          else
            echo "Coverage file not found, skipping threshold check"
          fi

      - name: Run security audit
        working-directory: platform/${{ matrix.component }}
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Generate quality report
        if: always()
        run: |
          echo "## Quality Gate Report for ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **ESLint**: ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **TypeScript**: ${{ steps.typecheck.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: ${{ steps.test.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ steps.audit.outcome }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.component }}
          path: platform/${{ matrix.component }}/coverage/
          retention-days: 7

  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()

    steps:
      - name: Generate overall summary
        run: |
          echo "## Overall Quality Gate Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Component Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.quality-gate.outputs.backend-status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.quality-gate.outputs.frontend-status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.quality-gate.result }}" != "success" ]]; then
            echo "❌ Quality gate failed. Please fix the issues above." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All quality gates passed!" >> $GITHUB_STEP_SUMMARY
          fi
