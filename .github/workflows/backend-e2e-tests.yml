name: Backend E2E Tests

on:
  workflow_dispatch:
    inputs:
      run_specific_scenario:
        description: 'Run specific test scenario (optional)'
        required: false
        default: ''

jobs:
  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: opclaw_test
          POSTGRES_USER: opclaw
          POSTGRES_PASSWORD: opclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/backend/package-lock.json

      - name: Install dependencies
        working-directory: ./platform/backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./platform/backend
        run: npm run build

      - name: Setup Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose
          sudo systemctl start docker
          sudo usermod -aG docker $USER
          newgrp docker

      - name: Verify Docker installation
        run: |
          docker --version
          docker info

      - name: Create Docker network
        run: |
          docker network create opclaw-network || echo "Network already exists"

      - name: Setup test environment
        working-directory: ./platform/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: opclaw
          DB_PASSWORD: opclaw
          DB_NAME: opclaw_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'test-api-key-ci' }}
          FEISHU_APP_ID: test_feishu_app_id_ci
          FEISHU_APP_SECRET: test_feishu_app_secret_ci
          FEISHU_REDIRECT_URI: http://localhost:5173/oauth/callback
          JWT_SECRET: test-jwt-secret-ci
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
        run: |
          echo "Setting up test environment..."
          mkdir -p test-reports/e2e

      - name: Run database migrations
        working-directory: ./platform/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: opclaw
          DB_PASSWORD: opclaw
          DB_NAME: opclaw_test
        run: |
          echo "Running database migrations..."
          npm run db:migrate || echo "Migrations completed or already applied"

      - name: Run E2E tests
        working-directory: ./platform/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: opclaw
          DB_PASSWORD: opclaw
          DB_NAME: opclaw_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'test-api-key-ci' }}
          FEISHU_APP_ID: test_feishu_app_id_ci
          FEISHU_APP_SECRET: test_feishu_app_secret_ci
          FEISHU_REDIRECT_URI: http://localhost:5173/oauth/callback
          JWT_SECRET: test-jwt-secret-ci
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
        run: |
          if [ -n "${{ github.event.inputs.run_specific_scenario }}" ]; then
            echo "Running specific scenario: ${{ github.event.inputs.run_specific_scenario }}"
            npm run test:e2e -- --testNamePattern="${{ github.event.inputs.run_specific_scenario }}"
          else
            echo "Running all E2E tests"
            npm run test:e2e
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-test-results
          path: |
            platform/backend/test-reports/
            platform/backend/coverage/
          retention-days: 30

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-reports
          path: platform/backend/test-reports/e2e/
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: platform/backend/test-reports/e2e/junit-*.xml
          check_name: Backend E2E Test Results
          comment_mode: off

      - name: Generate PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportPath = 'platform/backend/test-reports/e2e';
            let comment = '## Backend E2E Test Results\n\n';

            try {
              const files = fs.readdirSync(reportPath);
              const jsonFiles = files.filter(f => f.endsWith('.json'));

              if (jsonFiles.length > 0) {
                const jsonReportPath = path.join(reportPath, jsonFiles[0]);
                const report = JSON.parse(fs.readFileSync(jsonReportPath, 'utf8'));

                comment += '### Summary\n\n';
                comment += '| Metric | Value |\n';
                comment += '|--------|-------|\n';
                comment += `| Total | ${report.summary.total} |\n`;
                comment += `| Passed | ✅ ${report.summary.passed} |\n`;
                comment += `| Failed | ❌ ${report.summary.failed} |\n`;
                comment += `| Skipped | ⏭️ ${report.summary.skipped} |\n`;
                comment += `| Success Rate | ${report.summary.successRate.toFixed(2)}% |\n`;
                comment += `| Duration | ${Math.round(report.duration / 1000)}s |\n\n`;

                if (report.summary.failed > 0) {
                  comment += '### Failed Tests\n\n';
                  report.results
                    .filter(r => r.status === 'failed')
                    .forEach(r => {
                      comment += `- **${r.scenario}** (${r.duration}ms)\n`;
                      if (r.error) {
                        comment += `  - Error: ${r.error.message}\n`;
                      }
                    });
                  comment += '\n';
                }

                if (report.performanceMetrics) {
                  comment += '### Performance Metrics\n\n';
                  comment += '| Metric | Value |\n';
                  comment += '|--------|-------|\n';
                  comment += `| Average | ${report.performanceMetrics.averageDuration.toFixed(2)}ms |\n`;
                  comment += `| Min | ${report.performanceMetrics.minDuration}ms |\n`;
                  comment += `| Max | ${report.performanceMetrics.maxDuration}ms |\n`;
                  comment += `| P50 | ${report.performanceMetrics.percentiles.p50.toFixed(2)}ms |\n`;
                  comment += `| P95 | ${report.performanceMetrics.percentiles.p95.toFixed(2)}ms |\n`;
                  comment += `| P99 | ${report.performanceMetrics.percentiles.p99.toFixed(2)}ms |\n\n`;
                }

                comment += '---\n\n';
                comment += '*Test results available in artifacts*';
              } else {
                comment += '⚠️ No test results found.';
              }
            } catch (error) {
              comment += `❌ Error reading test results: ${error.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  backend-e2e-tests-matrix:
    name: Backend E2E Tests (Matrix)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
        postgres-version: [15, 16]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_DB: opclaw_test
          POSTGRES_USER: opclaw
          POSTGRES_PASSWORD: opclaw
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: platform/backend/package-lock.json

      - name: Install dependencies
        working-directory: ./platform/backend
        run: npm ci

      - name: Build
        working-directory: ./platform/backend
        run: npm run build

      - name: Run E2E tests
        working-directory: ./platform/backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: opclaw
          DB_PASSWORD: opclaw
          DB_NAME: opclaw_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'test-api-key-matrix' }}
          FEISHU_APP_ID: test_feishu_app_id_matrix
          FEISHU_APP_SECRET: test_feishu_app_secret_matrix
          FEISHU_REDIRECT_URI: http://localhost:5173/oauth/callback
          JWT_SECRET: test-jwt-secret-matrix
          NODE_ENV: test
        run: npm run test:e2e

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}-postgres-${{ matrix.postgres-version }}
          path: platform/backend/coverage/
          retention-days: 7
