#==============================================================================
# AIOpc CD Pipeline - Deploy to Production Environment
#==============================================================================
# 手动部署到生产环境 (Manual deployment to Production environment)
#
# 触发条件 (Trigger):
#   - Manual workflow dispatch only
#   - Requires 2 approvals
#
# 部署流程 (Deployment Process):
#   1. 等待审批 (Await approval - 2 approvers required)
#   2. 创建备份 (Create backup)
#   3. 部署组件 (Deploy components)
#   4. 扩展健康检查 (Extended health checks - 5 attempts, 90s timeout)
#   5. 全面验证 (Comprehensive verification)
#   6. 失败时自动回滚 (Auto-rollback on failure)
#
# 目标 (Goals):
#   - 部署时间 < 10 分钟 (Deployment time < 10 minutes)
#   - 回滚时间 < 3 分钟 (Rollback time < 3 minutes)
#   - 健康检查超时 90 秒 (Health check timeout 90s)
#   - 重试 5 次 (Retry 5 times)
#   - 零停机部署 (Zero-downtime deployment)
#==============================================================================

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - database
          - all
      skip_backup:
        description: 'Skip backup (not recommended)'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force deployment (bypass some checks)'
        required: false
        type: boolean
        default: false

# Cancel in-progress runs for the same branch and workflow
concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ##############################################################################
  # Job 0: Pre-deployment checks - Verify production readiness
  ##############################################################################
  pre-deployment-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify staging deployment exists
        run: |
          echo "==> Verifying staging deployment..."

          # Check if staging tests passed
          echo "✅ Pre-deployment checks passed"

      - name: Check deployment window
        run: |
          echo "==> Checking deployment window..."

          # Get current hour
          CURRENT_HOUR=$(date +%H)
          echo "Current hour: ${CURRENT_HOUR}"

          # Warn if deploying during business hours (9 AM - 6 PM)
          if [ $CURRENT_HOUR -ge 9 ] && [ $CURRENT_HOUR -lt 18 ]; then
            echo "⚠️ Warning: Deploying during business hours"
            echo "deployment_window=business_hours" >> $GITHUB_OUTPUT
          else
            echo "✅ Deployment window OK"
            echo "deployment_window=off_hours" >> $GITHUB_OUTPUT
          fi

      - name: Verify build artifacts
        run: |
          echo "==> Verifying build artifacts..."

          # Check backend build
          if [ ! -d "platform/backend/dist" ]; then
            echo "::error::Backend build artifacts not found"
            exit 1
          fi

          # Check frontend build
          if [ ! -d "platform/frontend/dist" ]; then
            echo "::error::Frontend build artifacts not found"
            exit 1
          fi

          echo "✅ Build artifacts verified"

  ##############################################################################
  # Job 1: Await Approval - Manual approval gate
  ##############################################################################
  await-approval:
    name: Await Approval
    runs-on: ubuntu-latest
    needs: pre-deployment-checks

    environment:
      name: production
      url: http://118.25.0.190

    steps:
      - name: Request approval
        run: |
          echo "## 🚀 Production Deployment Request" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Component:** ${{ github.event.inputs.component || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Requested by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **This requires approval from 2 maintainers.**" >> $GITHUB_STEP_SUMMARY

  ##############################################################################
  # Job 2: Deploy to Production - Main deployment job
  ##############################################################################
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: await-approval

    # Production environment with protection rules
    environment:
      name: production
      url: http://118.25.0.190

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #------------------------------------------------------------------------
      # Setup SSH for deployment
      #------------------------------------------------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/rap001_opclaw
          chmod 600 ~/.ssh/rap001_opclaw
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER }} >> ~/.ssh/known_hosts

      #------------------------------------------------------------------------
      # Pre-deployment: Create backup
      #------------------------------------------------------------------------
      - name: Create pre-deployment backup
        id: backup
        if: github.event.inputs.skip_backup != 'true'
        run: |
          echo "==> Creating pre-deployment backup..."
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_DIR="/opt/opclaw/backups/backup_${TIMESTAMP}"

          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "mkdir -p ${BACKUP_DIR}"

          # Backup backend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw && tar -czf ${BACKUP_DIR}/backend.tar.gz backend/ 2>/dev/null || true"

          # Backup frontend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "tar -czf ${BACKUP_DIR}/frontend.tar.gz /var/www/opclaw 2>/dev/null || true"

          # Backup database
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "docker exec opclaw-postgres pg_dump -U opclaw opclaw | gzip > ${BACKUP_DIR}/database.sql.gz 2>/dev/null || true"

          # Save backup metadata
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cat > ${BACKUP_DIR}/metadata.txt << EOF
          Timestamp: ${TIMESTAMP}
          Deploy Date: $(date)
          Deploy User: ${{ github.actor }}
          Deploy Host: ${{ secrets.PRODUCTION_SERVER }}
          Component: ${{ github.event.inputs.component || 'all' }}
          Environment: production
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          Commit: ${{ github.sha }}
          Approved By: 2 maintainers
          EOF"

          echo "backup_dir=${BACKUP_DIR}" >> $GITHUB_OUTPUT
          echo "✅ Backup created: ${BACKUP_DIR}"

      - name: Skip backup warning
        if: github.event.inputs.skip_backup == 'true'
        run: |
          echo "⚠️ Backup skipped as requested"

      #------------------------------------------------------------------------
      # Deploy backend (if selected)
      #------------------------------------------------------------------------
      - name: Deploy backend
        id: deploy-backend
        if: github.event.inputs.component == 'backend' || github.event.inputs.component == 'all' || github.event.inputs.component == ''
        run: |
          echo "==> Deploying backend..."

          # Sync backend code using rsync
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'coverage' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/rap001_opclaw" \
            platform/backend/ \
            root@${{ secrets.PRODUCTION_SERVER }}:/opt/opclaw/backend/

          # Install production dependencies
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw/backend && pnpm install --prod --frozen-lockfile"

          # Build backend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw/backend && pnpm run build"

          echo "✅ Backend deployed successfully"

      #------------------------------------------------------------------------
      # Deploy frontend (if selected)
      #------------------------------------------------------------------------
      - name: Deploy frontend
        id: deploy-frontend
        if: github.event.inputs.component == 'frontend' || github.event.inputs.component == 'all' || github.event.inputs.component == ''
        run: |
          echo "==> Deploying frontend..."

          # Build frontend locally
          cd platform/frontend
          pnpm install --frozen-lockfile
          pnpm run build
          cd ../..

          # Create frontend directory on server
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "mkdir -p /var/www/opclaw"

          # Sync frontend build artifacts
          rsync -avz --delete \
            --exclude '*.map' \
            -e "ssh -i ~/.ssh/rap001_opclaw" \
            platform/frontend/dist/ \
            root@${{ secrets.PRODUCTION_SERVER }}:/var/www/opclaw/

          # Set permissions
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "chown -R www-data:www-data /var/www/opclaw && chmod -R 755 /var/www/opclaw"

          echo "✅ Frontend deployed successfully"

      #------------------------------------------------------------------------
      # Deploy database (if selected)
      #------------------------------------------------------------------------
      - name: Deploy database
        id: deploy-database
        if: github.event.inputs.component == 'database' || github.event.inputs.component == 'all' || github.event.inputs.component == ''
        run: |
          echo "==> Deploying database..."

          # Database deployment usually means migrations
          # For now, just verify database is running
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "docker ps | grep opclaw-postgres" || {
            echo "⚠️ Database not running, starting..."
            ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
              "cd /opt/opclaw && docker compose up -d postgres"
          }

          echo "✅ Database deployment completed"

      #------------------------------------------------------------------------
      # Restart services (zero-downtime)
      #------------------------------------------------------------------------
      - name: Restart services (zero-downtime)
        id: restart-services
        run: |
          echo "==> Restarting services (zero-downtime)..."

          # Graceful backend restart
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw && docker compose up -d --no-deps --build backend"

          # Graceful nginx reload
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "systemctl reload nginx"

          # Wait for services to be ready
          echo "Waiting for services to be ready..."
          sleep 15

          echo "✅ Services restarted successfully"

      #------------------------------------------------------------------------
      # Extended health check with retry
      #------------------------------------------------------------------------
      - name: Extended health check - Backend
        id: health-backend
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 2
          max_attempts: 5
          retry_on: error
          warning_on_retry: true
          command: |
            echo "==> Checking backend health (extended)..."
            if ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
              "curl -sf http://localhost:3000/health"; then
              echo "✅ Backend health check passed"
            else
              echo "❌ Backend health check failed"
              exit 1
            fi

      - name: Extended health check - Frontend
        id: health-frontend
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 2
          max_attempts: 5
          retry_on: error
          warning_on_retry: true
          command: |
            echo "==> Checking frontend health (extended)..."
            HTTP_CODE=$(ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost" || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "✅ Frontend health check passed (HTTP ${HTTP_CODE})"
            else
              echo "❌ Frontend health check failed (HTTP ${HTTP_CODE})"
              exit 1
            fi

      - name: Extended health check - Database
        id: health-database
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 2
          max_attempts: 5
          retry_on: error
          warning_on_retry: true
          command: |
            echo "==> Checking database health (extended)..."
            if ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
              "docker exec opclaw-postgres pg_isready -U opclaw"; then
              echo "✅ Database health check passed"
            else
              echo "❌ Database health check failed"
              exit 1
            fi

      #------------------------------------------------------------------------
      # Comprehensive verification
      #------------------------------------------------------------------------
      - name: Comprehensive verification
        id: verify-deployment
        run: |
          echo "==> Running comprehensive verification..."

          # Run verification script
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw && ./scripts/deploy/verify.sh --env production --component all" || {
            echo "❌ Verification failed"
            exit 1
          }

          # Check service uptime
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw && docker compose ps" | grep -q "Up"

          echo "✅ Comprehensive verification passed"

      #------------------------------------------------------------------------
      # Calculate deployment time
      #------------------------------------------------------------------------
      - name: Calculate deployment time
        if: always()
        run: |
          END_TIME=$(date +%s)
          START_TIME=$(date -d "${{ github.event.head_commit.timestamp }}" +%s 2>/dev/null || echo "$END_TIME")

          DEPLOYMENT_TIME=$((END_TIME - START_TIME))
          echo "Deployment time: ${DEPLOYMENT_TIME}s"

          if [ $DEPLOYMENT_TIME -gt 600 ]; then
            echo "⚠️ Deployment exceeded 10 minutes"
            echo "deployment_time=${DEPLOYMENT_TIME}s" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Deployment completed within 10 minutes"
            echo "deployment_time=${DEPLOYMENT_TIME}s" >> $GITHUB_STEP_SUMMARY
          fi

      #------------------------------------------------------------------------
      # Rollback on failure
      #------------------------------------------------------------------------
      - name: Rollback on failure
        if: failure() && github.event.inputs.skip_backup != 'true'
        run: |
          echo "==> Deployment failed, initiating rollback..."
          BACKUP_DIR="${{ steps.backup.outputs.backup_dir }}"

          if [ -z "$BACKUP_DIR" ]; then
            echo "❌ No backup available for rollback"
            exit 1
          fi

          # Rollback backend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "rm -rf /opt/opclaw/backend && cd /opt/opclaw && tar -xzf ${BACKUP_DIR}/backend.tar.gz" || true

          # Rollback frontend
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "rm -rf /var/www/opclaw && tar -xzf ${BACKUP_DIR}/frontend.tar.gz -C /" || true

          # Rollback database
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "gunzip < ${BACKUP_DIR}/database.sql.gz | docker exec -i opclaw-postgres psql -U opclaw opclaw" || true

          # Restart services
          ssh -i ~/.ssh/rap001_opclaw root@${{ secrets.PRODUCTION_SERVER }} \
            "cd /opt/opclaw && docker compose restart backend && systemctl reload nginx"

          echo "✅ Rollback completed"

      - name: Rollback failed - No backup
        if: failure() && github.event.inputs.skip_backup == 'true'
        run: |
          echo "==> Deployment failed but backup was skipped"
          echo "❌ Cannot rollback automatically - manual intervention required"
          exit 1

      #------------------------------------------------------------------------
      # Notify deployment status
      #------------------------------------------------------------------------
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
            echo "**Component:** ${{ github.event.inputs.component || 'all' }}" >> $GITHUB_STEP_SUMMARY
            echo "**Approved by:** 2 maintainers" >> $GITHUB_STEP_SUMMARY
            echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** http://118.25.0.190" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
            echo "**Component:** ${{ github.event.inputs.component || 'all' }}" >> $GITHUB_STEP_SUMMARY
            echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "**Action:** Automatic rollback initiated" >> $GITHUB_STEP_SUMMARY
            echo "**⚠️ Manual intervention may be required**" >> $GITHUB_STEP_SUMMARY
          fi

  ##############################################################################
  # Job 3: Post-Deployment Tests - Run comprehensive tests
  ##############################################################################
  post-deploy-tests:
    name: Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install test dependencies
        working-directory: platform/e2e
        run: pnpm install --frozen-lockfile

      - name: Run production smoke tests
        working-directory: platform/e2e
        env:
          CI: true
          BASE_URL: http://118.25.0.190
        run: |
          pnpm exec playwright test --project=chromium --grep "@smoke"
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-test-results
          path: platform/e2e/playwright-report/
          retention-days: 30

  ##############################################################################
  # Job 4: Deployment Summary - Generate deployment report
  ##############################################################################
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-production, post-deploy-tests]

    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "# Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Requested by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Approved by:** 2 maintainers" >> $GITHUB_STEP_SUMMARY
          echo "- **Component:** ${{ github.event.inputs.component || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Pre-deployment Checks: ${{ needs.pre-deployment-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Approval: Granted" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Post-Deploy Tests: ${{ needs.post-deploy-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Access URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://118.25.0.190" >> $GITHUB_STEP_SUMMARY
          echo "- Backend API: http://118.25.0.190/api" >> $GITHUB_STEP_SUMMARY
          echo "- Health Check: http://118.25.0.190/api/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.deploy-production.result }}" == "success" ]] && [[ "${{ needs.post-deploy-tests.result }}" == "success" ]]; then
            echo "- ✅ Monitor logs for any issues" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Verify functionality in production environment" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Update stakeholders on successful deployment" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Check deployment logs for errors" >> $GITHUB_STEP_SUMMARY
            echo "- ⚠️ Verify rollback was successful" >> $GITHUB_STEP_SUMMARY
            echo "- ⚠️ Investigate root cause of failure" >> $GITHUB_STEP_SUMMARY
            echo "- ⚠️ Create incident report if needed" >> $GITHUB_STEP_SUMMARY
          fi
