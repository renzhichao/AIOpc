name: PR Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch and workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ##############################################################################
  # Job 1: Lint - Fast linting check for PR feedback
  ##############################################################################
  lint:
    name: Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: platform/${{ matrix.component }}
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: platform/${{ matrix.component }}
        run: pnpm run lint

      - name: Run TypeScript type check
        working-directory: platform/${{ matrix.component }}
        run: |
          if [ -f "tsconfig.json" ]; then
            pnpm exec tsc --noEmit
          else
            echo "No tsconfig.json found, skipping type check"
          fi

  ##############################################################################
  # Job 2: Test - Run unit tests for PR validation
  ##############################################################################
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: platform/${{ matrix.component }}
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: platform/${{ matrix.component }}
        run: pnpm run test

      - name: Run tests with coverage
        if: github.event_name == 'pull_request'
        working-directory: platform/${{ matrix.component }}
        run: pnpm run test:coverage
        continue-on-error: true

      - name: Check coverage threshold (≥80%)
        if: github.event_name == 'pull_request'
        working-directory: platform/${{ matrix.component }}
        run: |
          # Extract coverage percentage from Jest/Vitest output
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -e "
              const summary = require('./coverage/coverage-summary.json');
              const total = summary.total;
              const linesPct = total.lines.pct;
              console.log(linesPct);
            ")
            echo "Current coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "::warning::Coverage ${COVERAGE}% is below threshold 80%"
            fi
          elif [ -f "coverage/coverage-final.json" ]; then
            # Vitest format
            COVERAGE=$(node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
              let totalLines = 0;
              let coveredLines = 0;
              Object.values(data).forEach(file => {
                totalLines += (file.lines?.total || 0);
                coveredLines += (file.lines?.covered || 0);
              });
              const coverage = totalLines > 0 ? (coveredLines / totalLines * 100).toFixed(2) : 0;
              console.log(coverage);
            ")
            echo "Current coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "::warning::Coverage ${COVERAGE}% is below threshold 80%"
            fi
          else
            echo "::warning::Coverage file not found, skipping threshold check"
          fi

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-${{ matrix.component }}
          path: platform/${{ matrix.component }}/coverage/
          retention-days: 3

  ##############################################################################
  # Job 3: Build - Verify build succeeds
  ##############################################################################
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: platform/${{ matrix.component }}
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.component }}
        working-directory: platform/${{ matrix.component }}
        run: pnpm run build

      - name: Verify build output
        working-directory: platform/${{ matrix.component }}
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            if [ ! -d "dist" ]; then
              echo "::error::Backend build output 'dist' directory not found"
              exit 1
            fi
            echo "✅ Backend build successful"
          elif [ "${{ matrix.component }}" = "frontend" ]; then
            if [ ! -d "dist" ]; then
              echo "::error::Frontend build output 'dist' directory not found"
              exit 1
            fi
            echo "✅ Frontend build successful"
          fi

  ##############################################################################
  # PR Summary - Generate PR check summary
  ##############################################################################
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Generate PR summary
        run: |
          echo "## PR Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Overall Status" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.lint.result }}" == "success" ]] && [[ "${{ needs.test.result }}" == "success" ]] && [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All PR checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ PR checks failed. Please review the job logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
